name: Generate Codebase Graph

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  generate-graph:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Graphify
        run: pip install "graphifyy[gemini]"

      - name: Generate Codebase Graph
        # Passing GEMINI_API_KEY from GitHub secrets for semantic extraction of doc files
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: graphify extract . --no-cluster

      - name: Upload Graph to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codebase-graph
          path: graphify-out/graph.json
          retention-days: 14 # Store for 14 days

